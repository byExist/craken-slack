name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uvx ruff@0.14.6 check .

      - name: Ruff format check
        run: uvx ruff@0.14.6 format --check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Tests (100% coverage)
        run: uv run pytest
